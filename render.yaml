# render.yaml — VoiceRx Sync deployment blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this file to your GitHub repo
#   2. Go to Render Dashboard → New → Blueprint
#   3. Connect your repo — Render auto-detects this file
#   4. Fill in the secret env vars marked with sync: false

services:
  # ── Backend: FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: voicerx-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    envVars:
      # ── Required secrets (fill in Render dashboard) ──
      - key: GROQ_API_KEY
        sync: false          # paste your key in Render dashboard

      - key: MONGO_URI
        sync: false          # mongodb+srv://...

      - key: FIREBASE_API_KEY
        sync: false

      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value

      # ── Optional ──
      - key: MONGO_DB_NAME
        value: voicerx

      - key: PATIENT_ENCRYPT_KEY
        sync: false          # leave blank to auto-derive from JWT_SECRET

      - key: ALLOWED_ORIGINS
        sync: false          # set AFTER frontend deploys, e.g. https://voicerx-frontend.onrender.com

  # ── Frontend: Next.js ───────────────────────────────────────────────────────
  - type: web
    name: voicerx-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      # Point frontend at the backend service above
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: voicerx-backend
          type: web
          property: host          # auto-filled with https://voicerx-backend.onrender.com

      # ── Firebase config (fill in Render dashboard) ──
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false

      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false

      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false

      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false

      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false

      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
